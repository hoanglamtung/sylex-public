pluginManagement { includeBuild("../node_modules/@react-native/gradle-plugin") }
plugins { id("com.facebook.react.settings") version "0.84.1"
    id 'org.gradle.toolchains.foojay-resolver-convention' version '1.0.0' }

def nodeBinary = [
    providers.gradleProperty("NODE_BINARY").orNull,
    System.getenv("NODE_BINARY"),
    "/usr/local/bin/node",
    "/opt/homebrew/bin/node",
    "node",
].find { it != null && (it == "node" || file(it).exists()) }

def reactNativeCli = file("../node_modules/@react-native-community/cli/build/bin.js")

extensions.configure(com.facebook.react.ReactSettingsExtension) { ex ->
    ex.autolinkLibrariesFromCommand([nodeBinary, reactNativeCli.absolutePath, "config"])
}
rootProject.name = 'AssistantPro'
include ':app'
includeBuild('../node_modules/@react-native/gradle-plugin')
